# See https://github.com/GNOME/gtk/blob/4.6.9/gdk/x11/gdksettings.c for valid keys
Gdk/WindowScalingFactor 2
Gtk/ColorPalette "black:white:gray50:red:purple:blue:light blue:green:yellow:orange:lavender:brown:goldenrod4:dodger blue:pink:light green:gray10:gray30:gray75:gray90"
Gtk/CursorBlinkTimeout 10
Gtk/CursorThemeName "phinger-cursors-light"
Gtk/CursorThemeSize 48
Gtk/DecorationLayout "maximize,minimize:close"
Gtk/DialogsUseHeader 1
Gtk/EnableAnimations 1
Gtk/EnablePrimaryPaste 1
Gtk/FontName "Ubuntu Sans 11"
Gtk/IMModule "ibus"
Gtk/KeynavUseCaret 0
Gtk/KeyThemeName "Default"
Gtk/OverlayScrolling 1
Gtk/PrimaryButtonWarpsSlider 1
