Gtk/RecentFilesMaxAge -1
Gtk/ShellShowsAppMenu 0
Gtk/ShellShowsDesktop 1
Gtk/TitlebarDoubleClick "toggle-maximize"
Gtk/TitlebarMiddleClick "lower"
Gtk/TitlebarRightClick "menu"
Gdk/UnscaledDPI 98304
Net/CursorBlink 1
Net/CursorBlinkTime 1200
Net/DndDragThreshold 8
Net/DoubleClickDistance 5
Net/DoubleClickTime 400
Net/EnableEventSounds 1
Net/EnableInputFeedbackSounds 1
Net/IconThemeName "Adwaita"
Net/SoundThemeName "freedesktop"
Net/ThemeName "Adwaita"
Xft/Antialias 1
Xft/DPI 196608
Xft/Hinting 1
Xft/HintStyle "hintslight"
Xft/RGBA "rgb"
